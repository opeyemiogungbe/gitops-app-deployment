apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kustomize-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/opeyemiogungbe/gitops-app-deployment.git
    targetRevision: main
    path: overlay/prod
  destination:
    # Replace with the name of the prod cluster registered in Argo CD
    name: prod-cluster
    namespace: prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
