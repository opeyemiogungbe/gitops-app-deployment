resources:
  - deployment.yaml
  - service.yaml

configMapGenerator:
- name: my-configmap
  literals:
  - key1=value1
  - key2=value2
- name: my-app-config
  literals:
  - app_name=MyKustomizeApp
  - log_level=debug

secretGenerator:
# Demo-only credentials. Do not use real credentials or production secrets here.
- name: my-secret
  literals:
  - username=admin
  - password=changeme
