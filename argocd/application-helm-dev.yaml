apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: my-app-helm-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/opeyemiogungbe/gitops-app-deployment.git
    targetRevision: main
    path: helm/my-app
    helm:
      releaseName: my-app
      values: |
        replicaCount: 1
  destination:
    server: https://kubernetes.default.svc
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
