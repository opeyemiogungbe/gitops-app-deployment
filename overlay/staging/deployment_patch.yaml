apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-app
spec:
  template:
    spec:
      containers:
        - name: app-container
          image: ghcr.io/opeyemiogungbe/kustomize-capstone:0a330bf60c0285a62edaf25b0a0d5e193aa0adf6
          env:
            - name: APP_ENV
              value: staging
            - name: LOG_LEVEL
              value: info
